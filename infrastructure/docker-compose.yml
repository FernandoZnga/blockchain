services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: educhain
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d educhain"]
      interval: 10s
      timeout: 5s
      retries: 5

  blockchain:
    image: node:22-alpine
    working_dir: /workspace
    command: sh -c "corepack enable && pnpm install && pnpm --filter @educhain/contracts exec hardhat node --hostname 0.0.0.0"
    volumes:
      - ..:/workspace
    ports:
      - "8545:8545"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8545 >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10

  api:
    image: node:22-alpine
    working_dir: /workspace
    command: sh -c "corepack enable && pnpm install && pnpm db:generate && pnpm --filter @educhain/api dev"
    env_file:
      - ../.env
    ports:
      - "4000:4000"
    volumes:
      - ..:/workspace
      - api_uploads:/workspace/apps/api/uploads
    depends_on:
      db:
        condition: service_healthy
      blockchain:
        condition: service_started

  web:
    image: node:22-alpine
    working_dir: /workspace
    command: sh -c "corepack enable && pnpm install && pnpm --filter @educhain/web dev"
    env_file:
      - ../.env
    ports:
      - "3000:3000"
    volumes:
      - ..:/workspace
    depends_on:
      api:
        condition: service_started

  adminer:
    image: adminer:4
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
  api_uploads:
